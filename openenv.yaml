spec_version: 1
name: fraud_ring_investigator_arena
version: 0.1.0
description: Sequential fraud investigation benchmark with three deterministic procedural task tracks.
type: space
runtime: fastapi
app: server.app:app
port: 8000
reward_range: [0.0, 1.0]
tags: [fraud, aml, reinforcement-learning, investigation, graph]
endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  metadata: GET /metadata
  health: GET /health
observation_space:
  type: object
  fields:
    - task_id: string
    - task_name: string
    - case_id: string
    - step_count: integer
    - time_tick: integer
    - seed_alert: object
    - visible_entities: list
    - visible_links: list
    - visible_payouts: list
    - done: boolean
action_space:
  type: object
  fields:
    - action_type: string
    - entity_id: string|null
    - payout_id: string|null
    - relation_type: string|null
    - direction: string|null
    - depth: integer|null
    - decision: string|null
    - suspect_entity_ids: list
reward_space:
  type: float
  range: [0.0, 1.0]
  partial_credit: true
  breakdown:
    - prevented_loss_ratio: float
    - benign_harm_ratio: float
    - suspect_f1: float
    - disposition_accuracy: float
    - cost_ratio: float
tasks:
  - id: task1
    name: Easy Single Ring V1
    difficulty: easy
    description: Compact single-ring cases with clearer payout pressure and fewer benign confounders.
    grader:
      type: llm
      prompt_template: >
        Score this easy fraud-investigation episode from 0.0 to 1.0 using the
        benchmark rubric: reward prevented fraud loss, penalize benign harm and
        unnecessary investigation cost, reward accurate suspect identification,
        and reward the correct final clear-or-escalate disposition.
  - id: task2
    name: Medium Confounded Ring V1
    difficulty: medium
    description: Noisier local cases with additional benign confounders and one or two payout waves.
    grader:
      type: llm
      prompt_template: >
        Score this medium fraud-investigation episode from 0.0 to 1.0 using the
        benchmark rubric: reward prevented fraud loss, penalize benign harm and
        unnecessary investigation cost, reward accurate suspect identification,
        and reward the correct final clear-or-escalate disposition.
  - id: task3
    name: Hard Reserve Ring V1
    difficulty: hard
    description: Harder cases with deeper hidden structure, more confounders, and possible reserve-route behavior.
    grader:
      type: llm
      prompt_template: >
        Score this hard fraud-investigation episode from 0.0 to 1.0 using the
        benchmark rubric: reward prevented fraud loss, penalize benign harm and
        unnecessary investigation cost, reward accurate suspect identification,
        and reward the correct final clear-or-escalate disposition.
