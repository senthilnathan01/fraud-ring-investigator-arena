spec_version: 1
name: fraud_ring_investigator_arena
version: "0.1.0"
description: "Sequential fraud investigation benchmark with three seeded procedural task tracks."
type: space
runtime: fastapi
app: server.app:app
port: 7860
entry_point: server.environment:FraudRingInvestigatorArenaEnvironment

endpoints:
  reset: /reset
  step: /step
  state: /state
  tasks: /tasks
  grader: /grader
  metadata: /metadata
  health: /health

reward:
  min: 0.0
  max: 1.0

observation_space:
  type: object
  description: Fraud investigation observation surface exposed after reset and step.
  properties:
    task_id:
      type: string
    task_name:
      type: string
    case_id:
      type: string
    step_count:
      type: integer
    time_tick:
      type: integer
    seed_alert:
      type: object
    visible_entities:
      type: array
    visible_links:
      type: array
    visible_payouts:
      type: array
    done:
      type: boolean

action_space:
  type: object
  description: Typed investigation and intervention actions available to the agent.
  properties:
    action_type:
      type: string
    entity_id:
      type: string
    payout_id:
      type: string
    relation_type:
      type: string
    direction:
      type: string
    depth:
      type: integer
    decision:
      type: string
    suspect_entity_ids:
      type: array

tasks:
  - id: easy
    name: Easy Single Ring V1
    difficulty: easy
    description: "Compact single-ring cases with clearer payout pressure and fewer benign confounders."
    max_steps: 8
    grader: server.graders:EasyGrader

  - id: medium
    name: Medium Confounded Ring V1
    difficulty: medium
    description: "Noisier local cases with additional benign confounders and one or two payout waves."
    max_steps: 10
    grader: server.graders:MediumGrader

  - id: hard
    name: Hard Reserve Ring V1
    difficulty: hard
    description: "Harder cases with deeper hidden structure, more confounders, and possible reserve-route behavior."
    max_steps: 12
    grader: server.graders:HardGrader
