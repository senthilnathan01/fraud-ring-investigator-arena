spec_version: 1
name: fraud_ring_investigator_arena
type: space
runtime: fastapi
app: server.app:app
port: 7860

description: "Sequential fraud investigation benchmark with three seeded procedural task tracks."

reward_range: [0.0, 1.0]

tasks:
  - id: easy
    name: Easy Single Ring V1
    difficulty: easy
    grader: server.graders:EasyGrader
  - id: medium
    name: Medium Confounded Ring V1
    difficulty: medium
    grader: server.graders:MediumGrader
  - id: hard
    name: Hard Reserve Ring V1
    difficulty: hard
    grader: server.graders:HardGrader

action_space:
  type: object
  properties:
    action_type:
      type: string
    entity_id:
      type: string
    payout_id:
      type: string
    relation_type:
      type: string
    direction:
      type: string
    depth:
      type: integer
    decision:
      type: string
    suspect_entity_ids:
      type: array

observation_space:
  type: object
  properties:
    task_id:
      type: string
    task_name:
      type: string
    case_id:
      type: string
    step_count:
      type: integer
    time_tick:
      type: integer
    done:
      type: boolean
